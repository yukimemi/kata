<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" width="560" height="180" role="img" aria-label="kata — multi-project template applier">
  <title>kata — 型 — multi-project template applier with AI-delegated merge</title>

  <defs>
    <linearGradient id="g-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a5573"/>
      <stop offset="1" stop-color="#2c4259"/>
    </linearGradient>
    <linearGradient id="g-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3eb8a8"/>
      <stop offset="1" stop-color="#2f968a"/>
    </linearGradient>
    <linearGradient id="g-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f08c70"/>
      <stop offset="1" stop-color="#d56a52"/>
    </linearGradient>
  </defs>

  <!--
    Three rectangular "stencil" layers offset down-right, evoking the
    "compose multiple kata (templates)" core idea: pj-base, pj-rust,
    pj-rust-cli stacking, last layer wins on overlap.
  -->
  <g>
    <rect x="20" y="22" width="120" height="120" rx="14" fill="url(#g-base)"/>
    <rect x="38" y="36" width="120" height="120" rx="14" fill="url(#g-mid)" opacity="0.96"/>
    <rect x="56" y="50" width="120" height="120" rx="14" fill="url(#g-top)" opacity="0.97"/>
  </g>

  <!--
    型 (kata) — centred on the topmost stencil. The CJK font fallback
    chain works on Windows / macOS / common Linux distros without an
    embedded font.
  -->
  <text x="116" y="138"
        font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', 'IPAexMincho', 'Source Han Serif JP', serif"
        font-size="84" font-weight="700"
        fill="#fffaf0" text-anchor="middle"
        style="letter-spacing:0">型</text>

  <!-- Wordmark + tagline -->
  <g transform="translate(210, 0)">
    <text x="0" y="98"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif"
          font-size="72" font-weight="800"
          fill="#e8edf3"
          style="letter-spacing:-3px">kata</text>
    <text x="2" y="128"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif"
          font-size="15" font-weight="500"
          fill="#a8b2bd"
          style="letter-spacing:0.2px">multi-project template applier · AI-delegated merge</text>
    <text x="2" y="148"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif"
          font-size="13" font-weight="400"
          fill="#7a8590"
          style="letter-spacing:0.6px">型 · the woodblock pattern, pressed onto every project</text>
  </g>
</svg>
